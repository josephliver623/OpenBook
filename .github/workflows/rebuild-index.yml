name: Rebuild Signal Index

on:
  push:
    branches: [main]
    paths:
      - 'data/signals/**'

permissions:
  contents: write

concurrency:
  group: index-update
  cancel-in-progress: false

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Rebuild _index.json from signal files
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const yaml = require('js-yaml');

          const signalsDir = 'data/signals';
          const indexPath = '_index.json';

          // Read existing index to preserve reviews/other data
          let existing = { reviews: [], signals: [] };
          if (fs.existsSync(indexPath)) {
            try {
              existing = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
            } catch (e) {
              console.log('Could not parse existing index, starting fresh');
            }
          }

          // Scan all signal .md files
          const files = fs.readdirSync(signalsDir)
            .filter(f => f.endsWith('.md') && f !== 'README.md')
            .sort();

          console.log(`Found ${files.length} signal files`);

          const signals = [];
          for (const file of files) {
            const filePath = path.join(signalsDir, file);
            const content = fs.readFileSync(filePath, 'utf8');

            // Extract YAML frontmatter
            const match = content.match(/^---\n([\s\S]*?)\n---/);
            if (!match) {
              console.log(`  Skipping ${file}: no frontmatter`);
              continue;
            }

            try {
              const meta = yaml.load(match[1]);
              const signal = {
                _schema: meta._schema || 'openbook/signal/v1',
                _id: `signals/${file.replace('.md', '')}`,
                target_name: meta.target_name,
                target_category: meta.target_category,
                signal_type: meta.signal_type,
                city: meta.city,
                date: meta.date instanceof Date ? meta.date.toISOString() : String(meta.date || ''),
                severity: meta.severity || 'info',
                content: meta.content,
                file: `data/signals/${file}`,
              };

              // Include optional fields
              if (meta.subcategory) signal.subcategory = meta.subcategory;
              if (meta.district) signal.district = meta.district;
              if (meta.neighborhood) signal.neighborhood = meta.neighborhood;
              if (meta.address) signal.address = meta.address;
              if (meta.price && meta.price > 0) {
                signal.price = meta.price;
                if (meta.price_unit) signal.price_unit = meta.price_unit;
              }
              if (meta.tags && meta.tags.length > 0) signal.tags = meta.tags;
              if (meta.suitable_for && meta.suitable_for.length > 0) signal.suitable_for = meta.suitable_for;
              if (meta.recommendations && meta.recommendations.length > 0) signal.recommendations = meta.recommendations;
              if (meta.warnings && meta.warnings.length > 0) signal.warnings = meta.warnings;
              if (meta.rating_info) signal.rating_info = meta.rating_info;
              if (meta.price_context) signal.price_context = meta.price_context;

              signals.push(signal);
              console.log(`  Added: ${meta.target_name} (${file})`);
            } catch (e) {
              console.log(`  Error parsing ${file}: ${e.message}`);
            }
          }

          // Sort by date descending
          signals.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));

          // Update index, preserving reviews
          const updated = {
            ...existing,
            signals: signals,
          };

          fs.writeFileSync(indexPath, JSON.stringify(updated, null, 2));
          console.log(`\nIndex rebuilt: ${signals.length} signals`);
          SCRIPT

      - name: Commit updated index
        run: |
          git config user.name "OpenBook Bot"
          git config user.email "bot@openbook.now"
          git add _index.json
          if git diff --cached --quiet; then
            echo "No changes to _index.json"
          else
            git commit -m "chore: rebuild _index.json from signal files"
            git pull --rebase origin main || true
            git push
            echo "Index updated and pushed"
          fi
