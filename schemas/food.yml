name: food
display_name: "餐厅评价"
description: "分享你的美食体验"
icon: "🍜"

fields:
  title:
    type: string
    required: true
    description: "评价标题"
    agent_prompt: "请用一句话概括你的用餐体验"

  restaurant_name:
    type: string
    required: true
    description: "餐厅名称"
    agent_prompt: "餐厅叫什么名字？"

  overall_rating:
    type: number
    required: true
    min: 1
    max: 5
    step: 0.5
    description: "总体评分"
    agent_prompt: "总体打几分？1-5分"

  cuisine:
    type: string
    required: true
    description: "菜系"
    example: "川菜"
    agent_prompt: "什么菜系？"

  city:
    type: string
    required: true
    description: "城市"
    agent_prompt: "在哪个城市？"

  neighborhood:
    type: string
    required: false
    description: "区域"
    agent_prompt: "在哪个区域？"

  address:
    type: string
    required: false
    description: "地址"
    agent_prompt: "具体地址是？"

  price_per_person:
    type: number
    required: true
    unit: "USD"
    description: "人均消费"
    agent_prompt: "人均大概多少钱？"

  taste_rating:
    type: number
    required: true
    min: 1
    max: 5
    description: "口味评分"
    agent_prompt: "口味怎么样？1-5分"

  service_rating:
    type: number
    required: false
    min: 1
    max: 5
    description: "服务评分"
    agent_prompt: "服务态度怎么样？1-5分"

  environment_rating:
    type: number
    required: false
    min: 1
    max: 5
    description: "环境评分"
    agent_prompt: "用餐环境怎么样？1-5分"

  wait_time_minutes:
    type: number
    required: false
    description: "等位时间（分钟）"
    agent_prompt: "需要等位吗？大概等多久？"

  must_try:
    type: list
    required: false
    description: "推荐菜品"
    agent_prompt: "有什么推荐的菜吗？"

  avoid:
    type: list
    required: false
    description: "不推荐的菜"
    agent_prompt: "有什么踩雷的菜吗？"

  review_text:
    type: text
    required: false
    description: "详细评价"
    agent_prompt: "还有什么想补充的吗？"

  date:
    type: date
    required: true
    auto: "today"
    description: "发布日期"

  author:
    type: string
    required: false
    default: "anonymous"
    description: "作者"
