# Signal Schema — Atomic real-time experience fragments
# Signals are lightweight, time-stamped observations that complement Reviews.
# A Review is a comprehensive summary; a Signal is a single atomic fact.
#
# Schema URL: openbook/signal/v1

name: signal
display_name: "实时信号 / Real-time Signals"
description: "原子化的实时经验碎片。比完整评价更轻量、更及时、更易贡献。"
icon: "⚡"
schema_url: openbook/signal/v1
version: 1

agent_meta:
  primary_use: "Track real-time changes and atomic observations about places and services"
  query_by:
    - target_name
    - target_category
    - signal_type
    - city
    - date
  trust_level: community_reported
  freshness_note: "Signals are time-sensitive. Prioritize recent signals (< 30 days)."
  limitations: "Single observations, not comprehensive reviews. Cross-reference with Reviews for full picture."

fields:
  target_name:
    type: string
    required: true
    description: "被观察的目标名称（餐厅名、公寓名、公司名等）"
    agent_prompt: "你在说哪个地方？"
    intent: "Identifies the subject of the observation"
    example: "Seesaw Coffee 愚园路店"

  target_category:
    type: string
    required: true
    description: "目标所属分类"
    enum: [housing, food, jobs, other]
    labels: [租房, 美食, 求职, 其他]
    agent_prompt: "这是关于什么类别的？"
    intent: "Links signal to the correct review category for cross-referencing"

  city:
    type: string
    required: true
    description: "城市"
    agent_prompt: "在哪个城市？"
    example: "Shanghai"

  neighborhood:
    type: string
    required: false
    description: "具体区域/街区"
    agent_prompt: "具体在哪个区域？"
    example: "长宁区愚园路"

  signal_type:
    type: string
    required: true
    description: "信号类型——这条信息属于什么性质"
    enum: [price_change, staff_change, menu_change, quality_change, hours_change, address_change, closure, opening, tip, warning, update]
    labels: [价格变动, 人员变动, 菜单/产品变动, 品质变化, 营业时间变动, 地址变更, 关店, 新开, 小贴士, 警告, 一般更新]
    agent_prompt: "这是什么类型的变化？"
    intent: "Categorizes the signal for precise filtering by Agents"
    context: "Agents should use signal_type to determine relevance and urgency"

  content:
    type: text
    required: true
    description: "信号内容——用一两句话描述你观察到的变化"
    agent_prompt: "具体发生了什么？"
    intent: "The core observation in natural language"
    example: "换了新的咖啡师，拉花水平明显提升，推荐试试dirty"

  severity:
    type: string
    required: false
    description: "影响程度"
    enum: [info, notable, critical]
    labels: [一般信息, 值得注意, 重要变化]
    default: info
    agent_prompt: "这个变化的影响大吗？"
    intent: "Helps Agents prioritize which signals to surface"

  date:
    type: date
    required: true
    description: "观察日期"
    auto: today
    agent_prompt: "你是什么时候注意到的？"
    intent: "Timestamp for freshness ranking"
    context: "Signals older than 30 days should be treated with lower confidence"

  tags:
    type: list
    required: false
    description: "标签"
    agent_prompt: "有什么关键词标签吗？"
    example: ["咖啡", "新品", "涨价"]
