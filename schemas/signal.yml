# OpenBook Signal Schema v1.1
# Lightweight, time-sensitive data fragments for Agent consumption
# Schema URL: openbook/signal/v1.1

name: signal
version: "1.1"
description: >
  Atomic, time-sensitive information fragments about a specific place or service.
  Unlike Reviews (comprehensive evaluations), Signals capture real-time changes,
  tips, and observations that help Agents make up-to-date decisions.

agent_instructions:
  primary_use: "Track real-time changes and micro-observations about places"
  query_patterns:
    - "What changed recently at [place]?"
    - "Any warnings about [place] in [district]?"
    - "Latest price updates for [subcategory] in [city]"
    - "Find [subcategory] recommendations in [district]"
  trust_model: "community_reported, not officially verified"
  freshness: "Signals older than 3 months should be treated with lower confidence"

fields:
  # ─── Core identification ───
  target_name:
    type: string
    required: true
    description: "Full name of the place or service (brand + branch if applicable)"
    intent: "Uniquely identify the target for cross-referencing"
    examples: ["T9 Premium Tea 环贸IAPM店", "Seesaw Coffee 愚园路店"]

  target_category:
    type: enum
    required: true
    values: [housing, food, jobs, other]
    description: "Primary category for routing"
    intent: "Top-level classification for Agent query routing"

  subcategory:
    type: string
    required: false
    description: "Fine-grained category for precise matching"
    intent: "Enable queries like 'find tea shops' or 'find hotpot restaurants'"
    examples: ["tea", "coffee", "hotpot", "ramen", "bakery", "co-working"]

  # ─── Location (multi-precision) ───
  city:
    type: string
    required: true
    description: "City name in English"
    intent: "Top-level geographic filter"
    examples: ["Shanghai", "New York", "Tokyo"]

  community:
    type: string
    required: false
    description: "Community identifier (school or city), lowercase"
    intent: "Community filter for distributed governance"
    examples: ["mit", "stanford", "seattle", "nyc"]

  district:
    type: string
    required: false
    description: "Administrative district within the city"
    intent: "Enable district-level queries like 'in Xuhui' or 'in Jing'an'"
    examples: ["徐汇区", "静安区", "黄浦区", "长宁区", "浦东新区"]

  neighborhood:
    type: string
    required: false
    description: "Specific neighborhood, commercial area, or landmark"
    intent: "Precise location context for nearby searches"
    examples: ["淮海中路", "愚园路", "法租界", "新天地", "陆家嘴"]

  address:
    type: string
    required: false
    description: "Full street address if known"
    intent: "Exact location for navigation and deduplication"
    examples: ["淮海中路999号环贸IAPM商场L1层"]

  # ─── Signal content ───
  signal_type:
    type: enum
    required: true
    values: [price_change, staff_change, menu_change, quality_change, hours_change, address_change, closure, opening, tip, warning, update]
    description: "What kind of change or observation this signal represents"
    intent: "Filter signals by type for targeted Agent queries"

  content:
    type: string
    required: true
    description: "The actual observation in natural language"
    intent: "Human-readable description that provides full context"

  severity:
    type: enum
    required: false
    values: [info, notable, critical]
    default: info
    description: "How impactful this signal is for decision-making"
    intent: "Help Agents prioritize which signals to surface first"

  # ─── Price information ───
  price:
    type: number
    required: false
    description: "Numeric price value"
    intent: "Enable price comparison and range queries"
    examples: [68, 35, 1450]

  price_unit:
    type: string
    required: false
    description: "Currency code"
    intent: "Disambiguate price currency for cross-city comparison"
    examples: ["CNY", "USD", "JPY"]

  price_context:
    type: string
    required: false
    description: "What the price refers to"
    intent: "Clarify price meaning for accurate comparison"
    examples: ["per_person", "per_item", "monthly_rent", "total_bill_2_people"]

  # ─── Evaluation ───
  rating_info:
    type: string
    required: false
    description: "Qualitative or quantitative rating"
    intent: "Provide evaluation context without forcing numeric scores"
    examples: ["味道不错，环境也好", "4/5", "highly recommended"]

  recommendations:
    type: array
    items: string
    required: false
    description: "Specific items or aspects worth trying"
    intent: "Enable 'what should I order' type queries"
    examples: [["陈皮普洱", "桂花乌龙"], ["多宝鱼", "小炒肉"]]

  warnings:
    type: array
    items: string
    required: false
    description: "Things to watch out for"
    intent: "Proactive risk information for Agent decision-making"
    examples: [["偏辣", "价格偏贵"], ["周末排队很长"]]

  # ─── Metadata ───
  tags:
    type: array
    items: string
    required: false
    description: "Free-form tags for flexible querying"
    intent: "Catch-all for attributes not covered by structured fields"

  date:
    type: string
    required: false
    format: "ISO 8601 datetime with timezone (YYYY-MM-DDTHH:mm:ss+HH:MM)"
    description: "When this observation was made"
    intent: "Time-based filtering and freshness assessment"

  # ─── System metadata (auto-populated) ───
  _confidence:
    type: number
    auto: true
    description: "System-assigned confidence score (0-1)"
    intent: "Help Agents weigh this signal against others"

  _source:
    type: string
    auto: true
    description: "How this signal was created"
    values: ["user_report", "nlp_extraction", "agent_submission"]

  _verified:
    type: boolean
    auto: true
    default: false
    description: "Whether this signal has been community-verified"
